<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Saget's RFC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .admin-layout { display: flex; min-height: calc(100vh - 120px); }
        .admin-sidebar { width: 200px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); padding: 1rem; }
        .admin-sidebar h3 { font-size: 1rem; margin-bottom: 1rem; border: none; }
        .admin-sidebar a { display: block; padding: 0.5rem; color: var(--text-secondary); border-radius: 2px; }
        .admin-sidebar a:hover, .admin-sidebar a.active { background: var(--bg-primary); color: var(--text-primary); }
        .admin-content { flex: 1; padding: 1rem 2rem; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border-color); }
        .admin-table th { font-weight: 600; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; }
        .status-badge { padding: 0.125rem 0.5rem; border-radius: 2px; font-size: 0.75rem; font-family: var(--font-mono); }
        .status-published { background: #e8f5e9; color: #2e7d32; }
        .status-draft { background: #fff3e0; color: #e65100; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.8rem; margin-right: 0.5rem; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="site-title">Saget's RFC</a>
        <div class="nav-links">
            <a href="/">Documentos</a>
            <a href="/about">Acerca de</a>
            <a href="/admin">Admin</a>
            <a href="#" id="theme-toggle" title="Cambiar tema"><i class="fa-regular fa-lightbulb"></i></a>
        </div>
    </nav>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const icon = toggle.querySelector('i');
        const savedTheme = localStorage.getItem('theme');
        
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            icon.className = 'fa-solid fa-lightbulb';
        }
        
        toggle.addEventListener('click', (e) => {
            e.preventDefault();
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                icon.className = 'fa-solid fa-lightbulb';
                localStorage.setItem('theme', 'dark');
            } else {
                icon.className = 'fa-regular fa-lightbulb';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>

    <main class="container">
        <div class="admin-layout">
            <aside class="admin-sidebar">
                <h3>Administración</h3>
                <a href="/admin" class="{% if request.url.path == '/admin' %}active{% endif %}">Documentos</a>
                <a href="/admin/comments" class="{% if '/comments' in request.url.path %}active{% endif %}">Comentarios</a>
                <a href="/admin/new" class="{% if '/new' in request.url.path %}active{% endif %}">Nuevo Documento</a>
                <a href="/admin/logout" class="logout-link">Cerrar Sesión</a>
            </aside>
            
            <div class="admin-content">
                {% block admin_content %}{% endblock %}
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>Infraestructura, redes y virtualización desde el primer bit — 
            <a href="mailto:sagertp@gmail.com" title="Email"><i class="fa-regular fa-envelope"></i></a>
            <a href="https://github.com/sagertp" title="GitHub" target="_blank"><i class="fa-brands fa-github"></i></a>
            <a href="https://twitter.com/spomzper" title="Twitter" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://www.instagram.com/sagert_p/" title="Instagram" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        </p>
    </footer>
</body>
</html>
