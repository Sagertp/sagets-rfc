{% extends "admin_base.html" %}

{% block title %}{% if post %}Editar{% else %}Nuevo{% endif %} Post - Saget's RFC{% endblock %}

{% block admin_content %}
<h1>{% if post %}Editar{% else %}Nuevo{% endif %} Documento</h1>

<form method="post" action="{% if post %}/admin/edit/{{ post.slug }}{% else %}/admin/new{% endif %}">
    <div class="form-group">
        <label for="title">Título del Documento</label>
        <input type="text" id="title" name="title" value="{{ post.title if post else '' }}" required>
    </div>
    
    <div class="form-group">
        <label for="slug">Slug (URL)</label>
        <input type="text" id="slug" name="slug" value="{{ post.slug if post else '' }}" required>
    </div>
    
    <div class="form-group">
        <label for="author">Autor</label>
        <input type="text" id="author" name="author" value="{{ post.author if post else 'Saget M. P. Castillo' }}">
    </div>
    
    <div class="form-group">
        <label for="doc_type">Tipo de Documento</label>
        <select id="doc_type" name="doc_type">
            <option value="Informational" {% if post and post.doc_type == 'Informational' %}selected{% endif %}>Informational</option>
            <option value="Standards Track" {% if post and post.doc_type == 'Standards Track' %}selected{% endif %}>Standards Track</option>
            <option value="Best Current Practice" {% if post and post.doc_type == 'Best Current Practice' %}selected{% endif %}>Best Current Practice</option>
            <option value="Experimental" {% if post and post.doc_type == 'Experimental' %}selected{% endif %}>Experimental</option>
            <option value="Historic" {% if post and post.doc_type == 'Historic' %}selected{% endif %}>Historic</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="status">Estado</label>
        <select id="status" name="status">
            <option value="Active" {% if post and post.status == 'Active' %}selected{% endif %}>Active</option>
            <option value="Work in Progress" {% if post and post.status == 'Work in Progress' %}selected{% endif %}>Work in Progress</option>
            <option value="Draft" {% if post and post.status == 'Draft' %}selected{% endif %}>Draft</option>
            <option value="Obsoleted" {% if post and post.status == 'Obsoleted' %}selected{% endif %}>Obsoleted</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="rfc_number">Número RFC (opcional)</label>
        <input type="text" id="rfc_number" name="rfc_number" value="{{ post.rfc_number if post else '' }}" placeholder="ej: 1918">
    </div>
    
    <div class="form-group">
        <label for="category">Categoría/Tags</label>
        <input type="text" id="category" name="category" value="{{ post.category if post else '' }}" placeholder="ej: Networking, Virtualization">
    </div>
    
    <div class="form-group">
        <label for="content">Contenido</label>
        <textarea id="content" name="content" rows="20" required>{{ post.content if post else '' }}</textarea>
    </div>
    
    <div class="form-group">
        <label>
            <input type="checkbox" name="published" {% if post and post.published %}checked{% endif %}>
            Publicar inmediatamente
        </label>
    </div>
    
    <button type="submit" class="btn">{% if post %}Actualizar{% else %}Crear{% endif %} Documento</button>
    <a href="/admin" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
